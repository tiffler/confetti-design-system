<!--
  The two typefaces the system actually uses. Without these, every specimen renders in
  its fallback stack and Storybook silently misrepresents the design.

  Weight ranges cover what the tokens reference: Fredoka 500/600/700, JetBrains Mono 700.
  `display=swap` so text paints in the fallback immediately rather than blocking.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
  rel="stylesheet"
/>
